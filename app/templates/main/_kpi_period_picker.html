{# Center modal period picker for KPI Qualität & Produktivität #}
<style>
    .kpi-period-setup { margin-bottom: 0; }
    .kpi-period-setup-btn {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        width: 100%;
        padding: 0.65rem 0.85rem;
        border-radius: 10px;
        border: 1px solid #34343c;
        background: #25252b;
        color: #e8e8ec;
        text-align: left;
        transition: background 0.15s ease;
    }
    .kpi-period-setup-btn:not(:disabled):hover { background: rgba(226, 0, 116, 0.08); }
    .kpi-period-setup-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .kpi-period-setup-icon {
        width: 2.25rem; height: 2.25rem; border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0, 169, 224, 0.15); color: #4aa3ff; flex-shrink: 0;
    }
    .kpi-period-setup-text { flex: 1; min-width: 0; }
    .kpi-period-setup-text strong { display: block; font-size: 0.82rem; color: #b9b9c2; font-weight: 600; }
    .kpi-period-setup-value { display: block; font-size: 0.95rem; font-weight: 600; color: #fff; margin-top: 0.1rem; }
    .kpi-period-setup-action { font-size: 0.8rem; color: #e20074; white-space: nowrap; }
    .kpi-pp-modal .modal-content { background: #25252b; border-color: #34343c; color: #e8e8ec; }
    .kpi-pp-modal .modal-header, .kpi-pp-modal .modal-footer { border-color: #34343c; }
    .kpi-pp-tabs { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1rem; }
    .kpi-pp-tabs .btn {
        border-color: #4a4a55; color: #d6d6dd; background: #2a2a31;
        font-size: 0.8125rem; padding: 0.28rem 0.65rem;
    }
    .kpi-pp-tabs .btn.active { background: #e20074; border-color: #e20074; color: #fff; }
    .kpi-pp-panel { display: none; }
    .kpi-pp-panel.active { display: block; }
    .kpi-pp-label { font-size: 0.72rem; text-transform: lowercase; color: #9a9aa3; margin-bottom: 0.35rem; }
    .kpi-pp-month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.35rem; }
    .kpi-pp-month-grid .btn,
    .kpi-pp-week-grid .btn,
    .kpi-pp-quarter-grid .btn {
        border-color: #4a4a55; color: #d6d6dd; background: #2a2a31;
        position: relative;
    }
    .kpi-pp-month-grid .btn {
        font-size: 0.78rem; padding: 0.4rem 0.25rem;
        min-height: 2.1rem;
    }
    .kpi-pp-month-grid .btn.active,
    .kpi-pp-week-grid .btn.active,
    .kpi-pp-quarter-grid .btn.active { background: #e20074; border-color: #e20074; color: #fff; }
    .kpi-pp-month-grid .btn:disabled,
    .kpi-pp-week-grid .btn:disabled,
    .kpi-pp-quarter-grid .btn:disabled { opacity: 0.32; cursor: not-allowed; }
    .kpi-pp-month-grid .btn:disabled:hover,
    .kpi-pp-week-grid .btn:disabled:hover,
    .kpi-pp-quarter-grid .btn:disabled:hover { background: #2a2a31; }
    .kpi-pp-period-tick {
        position: absolute; top: 3px; right: 5px;
        font-size: 0.48rem; color: #36c6a0; line-height: 1;
    }
    .kpi-pp-month-grid .btn.active .kpi-pp-period-tick,
    .kpi-pp-week-grid .btn.active .kpi-pp-period-tick,
    .kpi-pp-quarter-grid .btn.active .kpi-pp-period-tick { color: rgba(255, 255, 255, 0.9); }
    .kpi-pp-week-grid {
        display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.3rem;
        max-height: 11rem; overflow-y: auto; padding-right: 0.15rem;
    }
    .kpi-pp-week-grid .btn { font-size: 0.68rem; padding: 0.32rem 0.15rem; min-height: 1.85rem; }
    .kpi-pp-quarter-grid { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .kpi-pp-quarter-grid .btn { min-width: 3.5rem; font-size: 0.78rem; padding: 0.4rem 0.5rem; min-height: 2.1rem; }
    .kpi-pp-data-legend { margin-top: 0.55rem; font-size: 0.72rem; color: #9a9aa3; }
    .kpi-pp-data-legend i { color: #36c6a0; margin-right: 0.25rem; }
    .kpi-pp-year-hint { margin-top: 0.45rem; font-size: 0.72rem; color: #9a9aa3; }
    .kpi-pp-year-hint i { color: #36c6a0; margin-right: 0.25rem; }
    .kpi-pp-summary {
        margin-top: 1rem; padding: 0.65rem 0.85rem; border-radius: 8px;
        background: #1f1f24; border: 1px solid #34343c; font-size: 0.88rem;
    }
    .kpi-pp-summary strong { color: #fff; }
</style>

<div class="kpi-period-setup">
    <button type="button" class="kpi-period-setup-btn" id="kpiOpenPeriodPicker"
            {% if not selection_made %}disabled title="Zuerst Projekt, Team oder Agent wählen"{% endif %}>
        <span class="kpi-period-setup-icon"><i class="fas fa-calendar-alt"></i></span>
        <span class="kpi-period-setup-text">
            <strong>Zeitraum</strong>
            <span class="kpi-period-setup-value" id="kpiPeriodSetupValue">{{ period_label|default('Noch nicht festgelegt') }}</span>
        </span>
        <span class="kpi-period-setup-action">Auswählen <i class="fas fa-chevron-right"></i></span>
    </button>
</div>

<input type="hidden" name="period" id="kpiPeriod" value="{{ period if period_confirmed else '' }}">
<input type="hidden" name="date_from" id="kpiDateFrom" value="{{ date_from if period_confirmed else '' }}">
<input type="hidden" name="date_to" id="kpiDateTo" value="{{ date_to if period_confirmed else '' }}">
<input type="hidden" name="period_year" id="kpiPeriodYear" value="{{ period_year if period_year is not none else '' }}">
<input type="hidden" name="period_month" id="kpiPeriodMonth" value="{{ period_month if period_month is not none else '' }}">
<input type="hidden" name="period_week" id="kpiPeriodWeek" value="{{ period_week if period_week is not none else '' }}">
<input type="hidden" name="period_quarter" id="kpiPeriodQuarter" value="{{ period_quarter if period_quarter is not none else '' }}">

<div class="modal fade" id="kpiPeriodPickerModal" tabindex="-1" role="dialog" aria-labelledby="kpiPeriodPickerTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content kpi-pp-modal">
            <div class="modal-header">
                <h5 class="modal-title" id="kpiPeriodPickerTitle"><i class="fas fa-calendar-alt text-info mr-1"></i> Zeitraum wählen</h5>
                <button type="button" class="close text-light" data-dismiss="modal" aria-label="Schließen"><span aria-hidden="true">&times;</span></button>
            </div>
            <div class="modal-body">
                <div class="kpi-pp-tabs btn-group btn-group-sm flex-wrap" role="group" id="kpiPpTabs">
                    <button type="button" class="btn" data-pp-type="free">Frei</button>
                    <button type="button" class="btn" data-pp-type="month">Monat</button>
                    <button type="button" class="btn" data-pp-type="week">Woche</button>
                    <button type="button" class="btn" data-pp-type="quarter">Quartal</button>
                    <button type="button" class="btn" data-pp-type="year">Jahr</button>
                    <button type="button" class="btn" data-pp-type="all">Gesamt</button>
                </div>

                <div class="kpi-pp-panel" data-pp-panel="free">
                    <div class="form-row">
                        <div class="col-6 mb-2">
                            <div class="kpi-pp-label">von</div>
                            <input type="date" class="form-control form-control-sm" id="kpiPpFreeFrom">
                        </div>
                        <div class="col-6 mb-2">
                            <div class="kpi-pp-label">bis</div>
                            <input type="date" class="form-control form-control-sm" id="kpiPpFreeTo">
                        </div>
                    </div>
                </div>

                <div class="kpi-pp-panel" data-pp-panel="month">
                    <div class="mb-2">
                        <div class="kpi-pp-label">jahr</div>
                        <select class="form-control form-control-sm" id="kpiPpMonthYear"></select>
                    </div>
                    <div class="kpi-pp-label">monat</div>
                    <div class="kpi-pp-month-grid" id="kpiPpMonthGrid"></div>
                    <p class="kpi-pp-data-legend mb-0 kpi-pp-panel-legend" data-pp-legend="month" style="display: none;">
                        <i class="fas fa-check"></i><span class="kpi-pp-legend-text"></span>
                    </p>
                </div>

                <div class="kpi-pp-panel" data-pp-panel="week">
                    <div class="mb-2">
                        <div class="kpi-pp-label">jahr</div>
                        <select class="form-control form-control-sm" id="kpiPpWeekYear"></select>
                    </div>
                    <div class="kpi-pp-label">kalenderwoche</div>
                    <div class="kpi-pp-week-grid" id="kpiPpWeekGrid"></div>
                    <p class="kpi-pp-data-legend mb-0 kpi-pp-panel-legend" data-pp-legend="week" style="display: none;">
                        <i class="fas fa-check"></i><span class="kpi-pp-legend-text"></span>
                    </p>
                </div>

                <div class="kpi-pp-panel" data-pp-panel="quarter">
                    <div class="mb-2">
                        <div class="kpi-pp-label">jahr</div>
                        <select class="form-control form-control-sm" id="kpiPpQuarterYear"></select>
                    </div>
                    <div class="kpi-pp-label">quartal</div>
                    <div class="kpi-pp-quarter-grid" id="kpiPpQuarterGrid"></div>
                    <p class="kpi-pp-data-legend mb-0 kpi-pp-panel-legend" data-pp-legend="quarter" style="display: none;">
                        <i class="fas fa-check"></i><span class="kpi-pp-legend-text"></span>
                    </p>
                </div>

                <div class="kpi-pp-panel" data-pp-panel="year">
                    <div class="kpi-pp-label">jahr</div>
                    <select class="form-control form-control-sm" id="kpiPpYearOnly"></select>
                    <p class="kpi-pp-year-hint mb-0 kpi-pp-panel-legend" data-pp-legend="year" style="display: none;">
                        <i class="fas fa-check"></i><span class="kpi-pp-legend-text"></span>
                    </p>
                </div>

                <div class="kpi-pp-panel" data-pp-panel="all">
                    <p class="text-muted small mb-0">Alle verfügbaren Daten im gewählten Projekt/Team/Agent — ohne Datumsbegrenzung.</p>
                </div>

                <div class="kpi-pp-summary">Auswahl: <strong id="kpiPpPreview">–</strong></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary btn-sm" data-dismiss="modal">Abbrechen</button>
                <button type="button" class="btn telekom-button btn-sm" id="kpiPpApply" disabled>Übernehmen &amp; anzeigen</button>
            </div>
        </div>
    </div>
</div>

<script>
window.initKpiPeriodPicker = function (form) {
    if (!form || form.dataset.kpiPeriodPickerInit === '1') return;
    form.dataset.kpiPeriodPickerInit = '1';

    var PERIOD_DATA = {{ period_data|default({'months': [], 'weeks': [], 'quarters': [], 'years': []})|tojson }};
    var DATA_TICK_LABEL = {{ period_data_tick_label|default('')|tojson }};
    var DATA_MONTHS = PERIOD_DATA.months || [];
    var DATA_WEEKS = PERIOD_DATA.weeks || [];
    var DATA_QUARTERS = PERIOD_DATA.quarters || [];
    var DATA_YEARS = PERIOD_DATA.years || [];
    var PERIOD_TICK = '<span class="kpi-pp-period-tick"><i class="fas fa-check"></i></span>';

    var openBtn = document.getElementById('kpiOpenPeriodPicker');
    var modal = document.getElementById('kpiPeriodPickerModal');
    var applyBtn = document.getElementById('kpiPpApply');
    var previewEl = document.getElementById('kpiPpPreview');
    var setupValue = document.getElementById('kpiPeriodSetupValue');
    var periodInput = document.getElementById('kpiPeriod');
    var dateFromInput = document.getElementById('kpiDateFrom');
    var dateToInput = document.getElementById('kpiDateTo');
    var yearInput = document.getElementById('kpiPeriodYear');
    var monthInput = document.getElementById('kpiPeriodMonth');
    var weekInput = document.getElementById('kpiPeriodWeek');
    var quarterInput = document.getElementById('kpiPeriodQuarter');
    if (!openBtn || !modal || !applyBtn) return;

    var MONTHS = ['Jan', 'Feb', 'Mär', 'Apr', 'Mai', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dez'];
    var MONTHS_LONG = ['', 'Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
    var today = new Date();
    var currentYear = today.getFullYear();
    var currentMonth = today.getMonth() + 1;

    function pad2(n) { return (n < 10 ? '0' : '') + n; }
    function fmtDe(iso) {
        if (!iso) return '';
        var p = iso.split('-');
        return p.length === 3 ? p[2] + '.' + p[1] + '.' + p[0] : iso;
    }
    function isoWeekOneMonday(year) {
        var jan4 = new Date(year, 0, 4);
        var day = jan4.getDay() || 7;
        jan4.setDate(jan4.getDate() - day + 1);
        return jan4;
    }
    function weekRange(year, week) {
        var start = isoWeekOneMonday(year);
        start.setDate(start.getDate() + (week - 1) * 7);
        var end = new Date(start);
        end.setDate(end.getDate() + 6);
        return {
            from: start.getFullYear() + '-' + pad2(start.getMonth() + 1) + '-' + pad2(start.getDate()),
            to: end.getFullYear() + '-' + pad2(end.getMonth() + 1) + '-' + pad2(end.getDate()),
        };
    }
    function quarterRange(year, q) {
        var sm = (q - 1) * 3 + 1;
        var em = sm + 2;
        var lastDay = new Date(year, em, 0).getDate();
        return {
            from: year + '-' + pad2(sm) + '-01',
            to: year + '-' + pad2(em) + '-' + pad2(lastDay),
        };
    }

    var state = {
        type: (periodInput && periodInput.value) || 'month',
        year: currentYear,
        month: currentMonth,
        week: 1,
        quarter: Math.ceil(currentMonth / 3),
        freeFrom: '',
        freeTo: '',
    };

    function yearsFromKeys(keys, splitToken) {
        var ys = {};
        keys.forEach(function (k) {
            var y = parseInt(k.split(splitToken)[0], 10);
            if (!isNaN(y)) ys[y] = true;
        });
        return Object.keys(ys).map(function (s) { return parseInt(s, 10); }).sort(function (a, b) { return a - b; });
    }

    function fillYearSelect(sel, selected, dataYears) {
        if (!sel) return;
        sel.innerHTML = '';
        var years = (dataYears && dataYears.length)
            ? dataYears.slice()
            : [];
        if (!years.length) {
            for (var y = currentYear + 1; y >= currentYear - 8; y--) years.push(y);
        }
        years.slice().reverse().forEach(function (y) {
            var opt = document.createElement('option');
            opt.value = String(y);
            opt.textContent = String(y);
            if (y === selected) opt.selected = true;
            sel.appendChild(opt);
        });
        if (years.indexOf(selected) < 0 && years.length) {
            sel.value = String(years[years.length - 1]);
            state.year = years[years.length - 1];
        }
    }

    function monthKey(year, month) {
        return year + '-' + pad2(month);
    }

    function weekKey(year, week) {
        return year + '-W' + pad2(week);
    }

    function quarterKey(year, quarter) {
        return year + '-Q' + quarter;
    }

    function monthHasData(year, month) {
        return DATA_MONTHS.indexOf(monthKey(year, month)) >= 0;
    }

    function weekHasData(year, week) {
        return DATA_WEEKS.indexOf(weekKey(year, week)) >= 0;
    }

    function quarterHasData(year, quarter) {
        return DATA_QUARTERS.indexOf(quarterKey(year, quarter)) >= 0;
    }

    function yearHasData(year) {
        return DATA_YEARS.indexOf(year) >= 0;
    }

    function updatePanelLegends() {
        document.querySelectorAll('.kpi-pp-panel-legend').forEach(function (el) {
            var panel = el.getAttribute('data-pp-legend');
            var show = !!DATA_TICK_LABEL && (
                (panel === 'month' && DATA_MONTHS.length) ||
                (panel === 'week' && DATA_WEEKS.length) ||
                (panel === 'quarter' && DATA_QUARTERS.length) ||
                (panel === 'year' && DATA_YEARS.length)
            );
            el.style.display = show ? '' : 'none';
            var txt = el.querySelector('.kpi-pp-legend-text');
            if (txt) txt.textContent = DATA_TICK_LABEL;
        });
    }

    function ensureValidMonthSelection() {
        if (monthHasData(state.year, state.month)) return;
        for (var m = 1; m <= 12; m++) {
            if (monthHasData(state.year, m)) {
                state.month = m;
                return;
            }
        }
    }

    function ensureValidWeekSelection() {
        if (weekHasData(state.year, state.week)) return;
        for (var w = 1; w <= 53; w++) {
            if (weekHasData(state.year, w)) {
                state.week = w;
                return;
            }
        }
    }

    function ensureValidQuarterSelection() {
        if (quarterHasData(state.year, state.quarter)) return;
        for (var q = 1; q <= 4; q++) {
            if (quarterHasData(state.year, q)) {
                state.quarter = q;
                return;
            }
        }
    }

    function ensureValidYearSelection() {
        if (yearHasData(state.year)) return;
        if (DATA_YEARS.length) state.year = DATA_YEARS[DATA_YEARS.length - 1];
    }

    function applyLatestDataDefaults() {
        if (DATA_MONTHS.length) {
            var mp = DATA_MONTHS[DATA_MONTHS.length - 1].split('-');
            state.year = parseInt(mp[0], 10) || currentYear;
            state.month = parseInt(mp[1], 10) || currentMonth;
        }
        if (DATA_WEEKS.length) {
            var wp = DATA_WEEKS[DATA_WEEKS.length - 1].split('-W');
            state.year = parseInt(wp[0], 10) || state.year;
            state.week = parseInt(wp[1], 10) || 1;
        }
        if (DATA_QUARTERS.length) {
            var qp = DATA_QUARTERS[DATA_QUARTERS.length - 1].split('-Q');
            state.year = parseInt(qp[0], 10) || state.year;
            state.quarter = parseInt(qp[1], 10) || 1;
        }
        if (DATA_YEARS.length) {
            state.year = DATA_YEARS[DATA_YEARS.length - 1];
        }
    }

    function rebuildMonthGrid() {
        var grid = document.getElementById('kpiPpMonthGrid');
        if (!grid) return;
        grid.innerHTML = '';
        MONTHS.forEach(function (label, idx) {
            var m = idx + 1;
            var hasData = monthHasData(state.year, m);
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn btn-sm';
            btn.setAttribute('data-m', String(m));
            btn.disabled = !hasData;
            btn.innerHTML = label + (hasData ? PERIOD_TICK : '');
            if (hasData) {
                btn.addEventListener('click', function () {
                    state.month = m;
                    syncMonthGrid();
                    updatePreview();
                });
            }
            grid.appendChild(btn);
        });
        ensureValidMonthSelection();
        syncMonthGrid();
    }

    function rebuildWeekGrid() {
        var grid = document.getElementById('kpiPpWeekGrid');
        if (!grid) return;
        grid.innerHTML = '';
        for (var w = 1; w <= 53; w++) {
            var hasData = weekHasData(state.year, w);
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn btn-sm';
            btn.setAttribute('data-w', String(w));
            btn.disabled = !hasData;
            btn.innerHTML = 'KW ' + w + (hasData ? PERIOD_TICK : '');
            if (hasData) {
                (function (weekNum) {
                    btn.addEventListener('click', function () {
                        state.week = weekNum;
                        syncWeekGrid();
                        updatePreview();
                    });
                })(w);
            }
            grid.appendChild(btn);
        }
        ensureValidWeekSelection();
        syncWeekGrid();
        var activeWeek = grid.querySelector('.btn.active');
        if (activeWeek) activeWeek.scrollIntoView({ block: 'nearest' });
    }

    function rebuildQuarterGrid() {
        var grid = document.getElementById('kpiPpQuarterGrid');
        if (!grid) return;
        grid.innerHTML = '';
        for (var q = 1; q <= 4; q++) {
            var hasData = quarterHasData(state.year, q);
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn btn-sm';
            btn.setAttribute('data-q', String(q));
            btn.disabled = !hasData;
            btn.innerHTML = 'Q' + q + (hasData ? PERIOD_TICK : '');
            if (hasData) {
                (function (quarterNum) {
                    btn.addEventListener('click', function () {
                        state.quarter = quarterNum;
                        syncQuarterGrid();
                        updatePreview();
                    });
                })(q);
            }
            grid.appendChild(btn);
        }
        ensureValidQuarterSelection();
        syncQuarterGrid();
    }

    function syncMonthGrid() {
        document.querySelectorAll('#kpiPpMonthGrid .btn').forEach(function (btn) {
            btn.classList.toggle('active', parseInt(btn.getAttribute('data-m'), 10) === state.month);
        });
    }

    function syncWeekGrid() {
        document.querySelectorAll('#kpiPpWeekGrid .btn').forEach(function (btn) {
            btn.classList.toggle('active', parseInt(btn.getAttribute('data-w'), 10) === state.week);
        });
    }

    function syncQuarterGrid() {
        document.querySelectorAll('#kpiPpQuarterGrid .btn').forEach(function (btn) {
            btn.classList.toggle('active', parseInt(btn.getAttribute('data-q'), 10) === state.quarter);
        });
    }

    function setActiveType(type) {
        state.type = type;
        document.querySelectorAll('#kpiPpTabs .btn').forEach(function (btn) {
            btn.classList.toggle('active', btn.getAttribute('data-pp-type') === type);
        });
        document.querySelectorAll('.kpi-pp-panel').forEach(function (panel) {
            panel.classList.toggle('active', panel.getAttribute('data-pp-panel') === type);
        });
        updatePreview();
    }

    function loadFromHidden() {
        var p = periodInput ? periodInput.value : '';
        if (p) state.type = p;
        if (state.type === 'free') {
            state.freeFrom = dateFromInput ? dateFromInput.value : '';
            state.freeTo = dateToInput ? dateToInput.value : '';
        }
        if (yearInput && yearInput.value) state.year = parseInt(yearInput.value, 10) || currentYear;
        if (monthInput && monthInput.value) state.month = parseInt(monthInput.value, 10) || currentMonth;
        if (weekInput && weekInput.value) state.week = parseInt(weekInput.value, 10) || 1;
        if (quarterInput && quarterInput.value) state.quarter = parseInt(quarterInput.value, 10) || 1;
    }

    function syncControlsFromState() {
        fillYearSelect(document.getElementById('kpiPpMonthYear'), state.year, yearsFromKeys(DATA_MONTHS, '-'));
        fillYearSelect(document.getElementById('kpiPpWeekYear'), state.year, yearsFromKeys(DATA_WEEKS, '-W'));
        fillYearSelect(document.getElementById('kpiPpQuarterYear'), state.year, yearsFromKeys(DATA_QUARTERS, '-Q'));
        fillYearSelect(document.getElementById('kpiPpYearOnly'), state.year, DATA_YEARS);
        var ff = document.getElementById('kpiPpFreeFrom');
        var ft = document.getElementById('kpiPpFreeTo');
        if (ff) ff.value = state.freeFrom;
        if (ft) ft.value = state.freeTo;
        rebuildMonthGrid();
        rebuildWeekGrid();
        rebuildQuarterGrid();
        updatePanelLegends();
    }

    function computePreview() {
        var t = state.type;
        if (t === 'all') return 'Gesamt';
        if (t === 'free') {
            if (state.freeFrom && state.freeTo && state.freeFrom <= state.freeTo) {
                return fmtDe(state.freeFrom) + ' – ' + fmtDe(state.freeTo);
            }
            return '';
        }
        if (t === 'month') return (MONTHS_LONG[state.month] || state.month) + ' ' + state.year;
        if (t === 'week') return 'KW ' + pad2(state.week) + '/' + String(state.year).slice(-2);
        if (t === 'quarter') return 'Q' + state.quarter + ' ' + state.year;
        if (t === 'year') return String(state.year);
        return '';
    }

    function isValid() {
        var t = state.type;
        if (t === 'all') return true;
        if (t === 'free') return state.freeFrom && state.freeTo && state.freeFrom <= state.freeTo;
        if (t === 'month') return state.year && state.month >= 1 && state.month <= 12 && monthHasData(state.year, state.month);
        if (t === 'week') return state.year && state.week >= 1 && state.week <= 53 && weekHasData(state.year, state.week);
        if (t === 'quarter') return state.year && state.quarter >= 1 && state.quarter <= 4 && quarterHasData(state.year, state.quarter);
        if (t === 'year') return !!state.year && yearHasData(state.year);
        return false;
    }

    function updatePreview() {
        var label = computePreview();
        if (previewEl) previewEl.textContent = label || '–';
        applyBtn.disabled = !isValid();
    }

    function readControlsIntoState() {
        var my = document.getElementById('kpiPpMonthYear');
        var wy = document.getElementById('kpiPpWeekYear');
        var qy = document.getElementById('kpiPpQuarterYear');
        var yo = document.getElementById('kpiPpYearOnly');
        var ff = document.getElementById('kpiPpFreeFrom');
        var ft = document.getElementById('kpiPpFreeTo');
        if (state.type === 'month' && my) state.year = parseInt(my.value, 10);
        if (state.type === 'week' && wy) state.year = parseInt(wy.value, 10);
        if (state.type === 'quarter' && qy) state.year = parseInt(qy.value, 10);
        if (state.type === 'year' && yo) state.year = parseInt(yo.value, 10);
        if (ff) state.freeFrom = ff.value;
        if (ft) state.freeTo = ft.value;
    }

    function writeHiddenAndSubmit() {
        readControlsIntoState();
        if (!isValid()) return;
        if (periodInput) periodInput.value = state.type;
        if (yearInput) yearInput.value = '';
        if (monthInput) monthInput.value = '';
        if (weekInput) weekInput.value = '';
        if (quarterInput) quarterInput.value = '';
        if (dateFromInput) dateFromInput.value = '';
        if (dateToInput) dateToInput.value = '';

        if (state.type === 'free') {
            if (dateFromInput) dateFromInput.value = state.freeFrom;
            if (dateToInput) dateToInput.value = state.freeTo;
        } else if (state.type === 'month') {
            if (yearInput) yearInput.value = state.year;
            if (monthInput) monthInput.value = state.month;
        } else if (state.type === 'week') {
            if (yearInput) yearInput.value = state.year;
            if (weekInput) weekInput.value = state.week;
        } else if (state.type === 'quarter') {
            if (yearInput) yearInput.value = state.year;
            if (quarterInput) quarterInput.value = state.quarter;
        } else if (state.type === 'year') {
            if (yearInput) yearInput.value = state.year;
        }

        var label = computePreview();
        if (setupValue) setupValue.textContent = label;
        if (typeof $ !== 'undefined') $('#kpiPeriodPickerModal').modal('hide');
        form.submit();
    }

    window.kpiClearPeriod = function () {
        if (periodInput) periodInput.value = '';
        if (dateFromInput) dateFromInput.value = '';
        if (dateToInput) dateToInput.value = '';
        if (yearInput) yearInput.value = '';
        if (monthInput) monthInput.value = '';
        if (weekInput) weekInput.value = '';
        if (quarterInput) quarterInput.value = '';
        if (setupValue) setupValue.textContent = 'Noch nicht festgelegt';
    };

    rebuildMonthGrid();
    rebuildWeekGrid();
    rebuildQuarterGrid();
    updatePanelLegends();
    document.querySelectorAll('#kpiPpTabs .btn').forEach(function (btn) {
        btn.addEventListener('click', function () { setActiveType(btn.getAttribute('data-pp-type')); });
    });
    var monthYearSel = document.getElementById('kpiPpMonthYear');
    if (monthYearSel) {
        monthYearSel.addEventListener('change', function () {
            state.year = parseInt(monthYearSel.value, 10) || currentYear;
            rebuildMonthGrid();
            updatePreview();
        });
    }
    var weekYearSel = document.getElementById('kpiPpWeekYear');
    if (weekYearSel) {
        weekYearSel.addEventListener('change', function () {
            state.year = parseInt(weekYearSel.value, 10) || currentYear;
            rebuildWeekGrid();
            updatePreview();
        });
    }
    var quarterYearSel = document.getElementById('kpiPpQuarterYear');
    if (quarterYearSel) {
        quarterYearSel.addEventListener('change', function () {
            state.year = parseInt(quarterYearSel.value, 10) || currentYear;
            rebuildQuarterGrid();
            updatePreview();
        });
    }
    ['kpiPpYearOnly', 'kpiPpFreeFrom', 'kpiPpFreeTo'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('input', function () { readControlsIntoState(); updatePreview(); });
        if (el) el.addEventListener('change', function () { readControlsIntoState(); updatePreview(); });
    });

    openBtn.addEventListener('click', function () {
        loadFromHidden();
        if (!periodInput || !periodInput.value) {
            state.type = 'month';
            applyLatestDataDefaults();
        }
        if (state.type === 'month') ensureValidMonthSelection();
        if (state.type === 'week') ensureValidWeekSelection();
        if (state.type === 'quarter') ensureValidQuarterSelection();
        if (state.type === 'year') ensureValidYearSelection();
        setActiveType(state.type);
        syncControlsFromState();
        updatePreview();
        if (typeof $ !== 'undefined') $('#kpiPeriodPickerModal').modal('show');
    });

    applyBtn.addEventListener('click', writeHiddenAndSubmit);

    if (new URLSearchParams(window.location.search).get('open_period') === '1') {
        var cleanUrl = new URL(window.location.href);
        cleanUrl.searchParams.delete('open_period');
        history.replaceState({}, '', cleanUrl.toString());
        if (openBtn && !openBtn.disabled && !(periodInput && periodInput.value)) {
            openBtn.click();
        }
    }
};
</script>
