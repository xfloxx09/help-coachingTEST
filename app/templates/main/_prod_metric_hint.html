{% if prod_formula_hint %}
<div class="kpi-metric-hint-wrap">
    <button type="button"
            class="btn btn-link btn-sm p-0 kpi-metric-hint-btn"
            aria-expanded="false"
            aria-label="Erklärung {{ prod_formula_hint.label }}">
        <i class="fas fa-question-circle"></i>
    </button>
    <div class="kpi-metric-hint-panel" role="tooltip" hidden>
        <div class="kpi-metric-hint-title">{{ prod_formula_hint.label }}</div>
        <p class="mb-2 small">{{ prod_formula_hint.summary }}</p>
        <p class="mb-1 small"><strong>Rohdaten:</strong><br><code>{{ prod_formula_hint.columns_expr }}</code></p>
        <p class="mb-0 small text-muted">{{ prod_formula_hint.denominator }}</p>
    </div>
</div>
{% endif %}
